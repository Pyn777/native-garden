<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Native Garden Planner</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f1;
      color: #1f2a1f;
    }

    header {
      background: #365c2f;
      color: white;
      padding: 18px;
      text-align: center;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 14px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
    }

    .map {
      position: relative;
      width: min(92vw, 440px);
      height: min(92vw, 440px);
      margin: auto;
      background: #cbdcbd;
      border: 2px solid #9daf8f;
      border-radius: 18px;
      overflow: hidden;
    }

    .house {
      position: absolute;
      left: 33%;
      top: 35%;
      width: 38%;
      height: 26%;
      background: #686d68;
      border-radius: 10px;
      transform: rotate(-24deg);
    }

    .zone {
      position: absolute;
      width: 58px;
      height: 38px;
      border: 2px solid #24451f;
      border-radius: 10px;
      background: white;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-24deg);
      cursor: pointer;
    }

    .zone.active {
      background: #fff0a6;
      border-color: #a67c00;
    }

    #BPL { left: 50%; top: 25%; }
    #BPR { left: 35%; top: 32%; }
    #GL { left: 20%; top: 45%; }
    #GR { left: 16%; top: 54%; }
    #FL { left: 29%; top: 62%; }
    #FR { left: 60%; top: 50%; }

    .bed-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px;
      background: #4f7f45;
      color: white;
      font-weight: bold;
    }

    .plant-card {
      border: 1px solid #d6dfcf;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .plant-card img {
      width: 100%;
      max-width: 230px;
      border-radius: 10px;
      margin: 8px 0;
      display: block;
    }

    .pill {
      display: inline-block;
      background: #eef5ea;
      border-radius: 999px;
      padding: 4px 8px;
      margin: 3px;
      font-size: .85rem;
    }

    .note {
      color: #5f6b5a;
    }
  </style>
</head>

<body>
  <header>
    <h1>Native Garden Planner</h1>
    <p>Tap a bed to view plants, bloom times, notes, and images.</p>
  </header>

  <main>
    <section class="card">
      <div class="map">
        <div class="house"></div>

        <div class="zone" id="BPL" data-bed="Back Porch Left">BPL</div>
        <div class="zone" id="BPR" data-bed="Back Porch Right">BPR</div>
        <div class="zone" id="GL" data-bed="Garage Left">GL</div>
        <div class="zone" id="GR" data-bed="Garage Right">GR</div>
        <div class="zone" id="FL" data-bed="Front Left">FL</div>
        <div class="zone" id="FR" data-bed="Front Right">FR</div>
      </div>

      <div class="bed-buttons">
        <button data-bed-button="Front Left">Front Left</button>
        <button data-bed-button="Front Right">Front Right</button>
        <button data-bed-button="Garage Left">Garage Left</button>
        <button data-bed-button="Garage Right">Garage Right</button>
        <button data-bed-button="Back Porch Left">Rear Left</button>
        <button data-bed-button="Back Porch Right">Rear Right</button>
      </div>
    </section>

    <section class="card">
      <h2 id="bedTitle"></h2>
      <p id="bedSummary"></p>
      <div id="plantList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
