<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garden Map</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7f1;
      color: #1f2a1f;
      text-align: center;
    }

    header {
      background: #365c2f;
      color: white;
      padding: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    .controls {
      margin: 12px 0;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #4f7f45;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin: 4px;
    }

    button.secondary {
      background: #e6eee1;
      color: #2f4f2b;
      border: 1px solid #cbd8c4;
    }

    .map {
      position: relative;
      width: min(92vw, 520px);
      height: min(92vw, 520px);
      max-width: 520px;
      max-height: 520px;
      margin: 16px auto;
      background: #cbdcbd;
      border: 2px solid #9daf8f;
      border-radius: 18px;
      overflow: hidden;
      touch-action: none;
    }

    .house {
      position: absolute;
      left: 32%;
      top: 39%;
      width: 36%;
      height: 28%;
      background: #555;
      transform: rotate(18deg);
      border-radius: 10px;
      opacity: 0.9;
    }

    .driveway {
      position: absolute;
      left: -8%;
      top: 58%;
      width: 45%;
      height: 15%;
      background: #ddd8ce;
      transform: rotate(-18deg);
      border-radius: 999px;
      opacity: 0.9;
    }

    .road {
      position: absolute;
      right: -18%;
      bottom: 8%;
      width: 70%;
      height: 10%;
      background: #b8b8b8;
      transform: rotate(-18deg);
      border-radius: 999px;
      opacity: 0.65;
    }

    .zone {
      position: absolute;
      width: 78px;
      height: 48px;
      border: 2px solid #24451f;
      border-radius: 10px;
      background: rgba(255,255,255,0.88);
      color: #172417;
      font-weight: bold;
      font-size: 14px;
      cursor: grab;
      transform: rotate(18deg);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .zone:active {
      cursor: grabbing;
    }

    .zone.active {
      background: #fff4b8;
      border-color: #a67c00;
    }

    .small-zone {
      width: 66px;
      height: 42px;
      font-size: 13px;
    }

 #BPL { left: 135px; top: 90px; }
#BPR { left: 285px; top: 80px; }

#GL { left: 80px; top: 230px; }
#GR { left: 260px; top: 245px; }

#FL { left: 75px; top: 385px; }
#FR { left: 315px; top: 365px; }

    .panel {
      background: white;
      border: 1px solid #d5decf;
      border-radius: 16px;
      padding: 16px;
      margin: 16px auto;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      text-align: left;
      max-width: 620px;
    }

    .panel h2 {
      margin-top: 0;
      text-align: center;
    }

    ul {
      margin: 0;
      padding-left: 24px;
      line-height: 1.7;
    }

    .hint {
      color: #5e6a5a;
      font-size: 14px;
      margin-top: 8px;
    }

    @media (max-width: 600px) {
      .zone {
        width: 62px;
        height: 38px;
        font-size: 12px;
      }

      .small-zone {
        width: 54px;
        height: 34px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Garden Map</h1>
    <p>Tap a bed to view plants. Drag beds to reposition them.</p>
  </header>

  <main>
    <div class="controls">
      <button class="secondary" id="resetButton">Reset Bed Positions</button>
    </div>

    <div class="map" id="map">
      <div class="driveway"></div>
      <div class="road"></div>
      <div class="house"></div>

      <div class="zone" id="FL" data-bed="Front Left">FL</div>
      <div class="zone" id="FR" data-bed="Front Right">FR</div>
      <div class="zone" id="GL" data-bed="Garage Left">GL</div>
      <div class="zone small-zone" id="GR" data-bed="Garage Right">GR</div>
      <div class="zone" id="BPL" data-bed="Back Porch Left">BPL</div>
      <div class="zone" id="BPR" data-bed="Back Porch Right">BPR</div>
    </div>

    <p class="hint">If dragging feels awkward, tap first to view the bed, then drag slowly. Positions save automatically on this device.</p>

    <section class="panel">
      <h2 id="bedTitle">Front Right</h2>
      <ul id="plantList"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
